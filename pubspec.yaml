name: stepooo
description: "A production-grade step tracking app with zero-delay 9-layer pipeline."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Tracking Core
  pedometer: ^4.1.1
  sensors_plus: ^6.1.1
  
  # Background & Sync
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.0.0
  health: 11.0.0
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Utils & UI
  geolocator: ^13.0.1
  permission_handler: ^11.0.0
  battery_plus: ^7.0.0
  device_info_plus: ^10.1.0
  fl_chart: ^0.69.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  flutter_local_notifications: ^18.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  lottie: ^3.3.1
  home_widget: ^0.7.0
  crypto: ^3.0.3
  flutter_staggered_grid_view: ^0.7.0
  http: ^1.6.0
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.1.0
  connectivity_plus: ^6.0.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  dio: ^5.9.2
  google_sign_in: ^6.1.0
  go_router: ^13.0.0
  flutter_bloc: ^8.1.6


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.3   # SQLite FFI for unit tests on desktop


flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
